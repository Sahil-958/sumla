name: Android CI & Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.1.8937393"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build humla-spongycastle
        run: |
          cd libraries/humla/libs/humla-spongycastle
          ../../../../gradlew jar

      - name: Build Release APKs
        run: ./gradlew assembleFossRelease assembleBetaRelease

      - name: Determine Tag
        id: tag
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "latest=false" >> $GITHUB_OUTPUT
          else
            echo "name=latest" >> $GITHUB_OUTPUT
            echo "latest=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.latest == 'true' && 'Latest Build' || steps.tag.outputs.name }}
          files: |
            app/build/outputs/apk/foss/release/*.apk
            app/build/outputs/apk/beta/release/*.apk
          draft: false
          prerelease: false
          make_latest: ${{ steps.tag.outputs.latest == 'true' && 'true' || 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

