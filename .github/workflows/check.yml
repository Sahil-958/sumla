name: Android CI Check

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.1.8937393"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build humla-spongycastle
        run: |
          cd libraries/humla/libs/humla-spongycastle
          ../../../gradlew jar

      - name: Build Release APKs (Dry Run)
        run: ./gradlew assembleFossRelease assembleBetaRelease
